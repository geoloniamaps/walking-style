version: 8
name: Walking Style (歩行者向け)
sources:
  geolonia:
    type: vector
    url: https://osm.v2.tiles.geolonia.com/tiles.json?key=YOUR-API-KEY
sprite: https://geoloniamaps.github.io/basic-v2/basic-v2
glyphs: https://glyphs.geolonia.com/{fontstack}/{range}.pbf
layers:
  # 背景
  - !!inc/file layers/background.yml
  # 地被
  - !!inc/file layers/landcover-grass.yml
  - !!inc/file layers/landcover-wood.yml
  # 水域
  - !!inc/file layers/water.yml
  - !!inc/file layers/oc-water.yml
  - !!inc/file layers/waterway.yml
  # 公園（歩行者に重要）
  - !!inc/file layers/park.yml
  # 施設
  - !!inc/file layers/landuse-school.yml
  - !!inc/file layers/landuse-hospital.yml
  # トンネル
  - !!inc/file layers/tunnel-casing.yml
  - !!inc/file layers/tunnel.yml
  # 道路
  - !!inc/file layers/highway-area.yml
  - !!inc/file layers/highway-minor-casing.yml
  - !!inc/file layers/highway-major-casing.yml
  - !!inc/file layers/highway-motorway-casing.yml
  # 歩道・遊歩道（強調）
  - !!inc/file layers/highway-path.yml
  - !!inc/file layers/highway-minor.yml
  - !!inc/file layers/highway-major.yml
  - !!inc/file layers/highway-motorway.yml
  # 鉄道
  - !!inc/file layers/railway.yml
  - !!inc/file layers/railway-hatching.yml
  # 橋
  - !!inc/file layers/bridge-casing.yml
  - !!inc/file layers/bridge.yml
  # 建物（歩行者には形状が重要）
  - !!inc/file layers/building.yml
  - !!inc/file layers/building-outline.yml
  # 行政境界
  - !!inc/file layers/boundary-land-level-2.yml
  - !!inc/file layers/boundary-land-level-4.yml
  # ラベル
  - !!inc/file layers/water-name.yml
  - !!inc/file layers/railway-name.yml
  - !!inc/file layers/road-name-minor.yml
  - !!inc/file layers/road-name.yml
  # POI
  - !!inc/file layers/poi-worship.yml
  - !!inc/file layers/poi-worship-primary.yml
  - !!inc/file layers/poi-park.yml
  - !!inc/file layers/poi-park-primary.yml
  - !!inc/file layers/poi-z16.yml
  - !!inc/file layers/poi-z16-primary.yml
  - !!inc/file layers/poi-z15.yml
  - !!inc/file layers/poi-z14.yml
  - !!inc/file layers/poi-z12.yml
  - !!inc/file layers/poi-railway.yml
  - !!inc/file layers/poi-mountain.yml
  - !!inc/file layers/poi-airport.yml
  - !!inc/file layers/poi-airport-primary.yml
  # 地名ラベル
  - !!inc/file layers/place-village.yml
  - !!inc/file layers/place-town.yml
  - !!inc/file layers/place-city.yml
  - !!inc/file layers/place-state.yml
  - !!inc/file layers/place-country.yml
