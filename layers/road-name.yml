id: road-name
type: symbol
source: geolonia
source-layer: transportation_name
filter:
  - all
  - - ==
    - network
    - road
  - - in
    - class
    - trunk
    - primary
    - secondary
    - tertiary
  - - '!in'
    - brunnel
    - tunnel
layout:
  text-font:
    - Noto Sans Universal Regular
  text-size: 13
  text-field: '{name}'
  text-max-width: 8
  text-padding: 50
  symbol-placement: line
  symbol-spacing:
    base: 1000
    stops:
      - - 10
        - 1000
      - - 12
        - 800
      - - 15
        - 600
paint:
  text-color: '#7a6550'
  text-halo-width: 1.5
  text-halo-color: 'rgba(250, 246, 240, 0.9)'
