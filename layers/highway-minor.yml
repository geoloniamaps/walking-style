id: highway-minor
type: line
source: geolonia
source-layer: transportation
filter:
  - all
  - - ==
    - $type
    - LineString
  - - '!='
    - brunnel
    - tunnel
  - - in
    - class
    - minor
    - service
    - track
layout:
  line-cap: round
  line-join: round
paint:
  line-color: '#f5efe5'
  line-width:
    - interpolate
    - - linear
    - - zoom
    - 11
    - 0.2
    - 13
    - 0.4
    - 14
    - 1.5
    - 16
    - 5
    - 20
    - 13
