id: road-name-minor
type: symbol
source: geolonia
source-layer: transportation_name
filter:
  - all
  - - ==
    - network
    - road
  - - in
    - class
    - minor
    - service
    - track
    - path
  - - '!in'
    - brunnel
    - tunnel
layout:
  text-font:
    - Noto Sans Universal Regular
  text-size: 11
  text-field: '{name}'
  text-max-width: 8
  text-padding: 40
  symbol-placement: line
  symbol-spacing:
    base: 1000
    stops:
      - - 10
        - 1000
      - - 12
        - 800
      - - 15
        - 500
paint:
  text-color: '#8a7560'
  text-halo-width: 1.5
  text-halo-color: 'rgba(250, 246, 240, 0.9)'
