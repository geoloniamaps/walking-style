id: place-state
type: symbol
source: geolonia
source-layer: place
filter:
  - all
  - - ==
    - class
    - state
layout:
  text-font:
    - Noto Sans Universal Regular
  text-size:
    stops:
      - - 4
        - 10
      - - 8
        - 14
  text-field: '{name}'
  text-max-width: 6
  text-padding: 30
paint:
  text-color: '#6a5a48'
  text-halo-width: 1.5
  text-halo-color: 'rgba(250, 246, 240, 0.9)'
