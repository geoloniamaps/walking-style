id: railway-name
type: symbol
source: geolonia
source-layer: transportation_name
filter:
  - all
  - - ==
    - class
    - rail
layout:
  text-font:
    - Noto Sans Universal Regular
  text-size: 11
  text-field: '{name}'
  text-max-width: 8
  text-padding: 40
  symbol-placement: line
  symbol-spacing: 600
paint:
  text-color: '#8a7e70'
  text-halo-width: 1.2
  text-halo-color: 'rgba(250, 246, 240, 0.85)'
