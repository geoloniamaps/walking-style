id: highway-motorway
type: line
source: geolonia
source-layer: transportation
filter:
  - all
  - - ==
    - $type
    - LineString
  - - '!in'
    - brunnel
    - bridge
    - tunnel
  - - ==
    - class
    - motorway
layout:
  line-cap: round
  line-join: round
paint:
  line-color: '#e8dece'
  line-width:
    - interpolate
    - - exponential
      - 0.9
    - - zoom
    - 5
    - 0.1
    - 8
    - 0.4
    - 14
    - 2.5
    - 16
    - 8
    - 18
    - 16
    - 20
    - 130
