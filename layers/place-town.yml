id: place-town
type: symbol
source: geolonia
source-layer: place
filter:
  - all
  - - ==
    - class
    - town
layout:
  text-font:
    - Noto Sans Universal Regular
  text-size:
    stops:
      - - 7
        - 11
      - - 12
        - 14
  text-field: '{name}'
  text-max-width: 6
  text-padding: 20
paint:
  text-color: '#6a5a48'
  text-halo-width: 1.2
  text-halo-color: 'rgba(250, 246, 240, 0.85)'
