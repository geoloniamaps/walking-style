id: highway-path
type: line
source: geolonia
source-layer: transportation
filter:
  - all
  - - ==
    - $type
    - LineString
  - - '!in'
    - brunnel
    - bridge
    - tunnel
  - - ==
    - class
    - path
layout:
  line-cap: round
  line-join: round
paint:
  line-color: '#d48c4e'
  line-width:
    base: 3
    stops:
      - - 14
        - 1.5
      - - 15
        - 2.5
      - - 17
        - 4
  line-opacity:
    stops:
      - - 13
        - 0.4
      - - 15
        - 0.8
      - - 17
        - 1
