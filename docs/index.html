<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>歩行者向けマップスタイル プレビュー</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: sans-serif;
    }
    #controls {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1;
      background: rgba(255, 255, 255, 0.95);
      padding: 12px 16px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      font-size: 14px;
      max-width: 280px;
    }
    #controls p {
      margin: 4px 0;
      color: #666;
      font-size: 12px;
    }
    .geolonia {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="controls">
    <strong>Walking Style</strong>
    <p>暖色系の親しみやすい配色。歩道・建物形状・ランドマークを強調</p>
  </div>
  <div
    id="map"
    class="geolonia"
    data-style="./style.json"
    data-lat="35.68"
    data-lng="139.77"
    data-zoom="15"
  ></div>
  <script src="https://cdn.geolonia.com/v1/embed?geolonia-api-key=YOUR-API-KEY"></script>
</body>
</html>
